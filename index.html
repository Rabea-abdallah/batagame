<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Batta UNO - Real-time multiplayer card game. Play UNO online with friends, Peer-to-Peer, no server required.">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦆</text></svg>">
  <title>Batta UNO - بطّة أونو</title>

  <link rel="preconnect" href="https://0.peerjs.com">
  <link rel="dns-prefetch" href="https://0.peerjs.com">

  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/home.css">
  <link rel="stylesheet" href="assets/css/lobby.css">
  <link rel="stylesheet" href="assets/css/game.css">
  <link rel="stylesheet" href="assets/css/animations.css">

  <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
</head>
<body>
  <div id="app" class="app"></div>

  <!-- Persistent UI elements (never removed) -->
  <div id="notification-container" class="notification-container"></div>
  <div id="modal-overlay"></div>
  <div id="color-picker-container"></div>
  <div id="card-flight-layer" class="card-flight-layer" aria-hidden="true"></div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(() => {});
      });
    }
  </script>
  <script type="module" src="assets/js/App.js"></script>
</body>
</html>
